<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
	<title>Tutor Sign Up - Walton MAT</title>
</head>
<body>
	<header class="top-nav">
		<div class="top-nav__inner">
			<div class="brand">
				<span class="brand__title">Charlie</span>
				<span class="brand__subtitle">Walton MAT Pairings</span>
			</div>
			<nav>
				<ul class="nav-list">
					<li><a href="/" class="nav-link">Home</a></li>
					<li><a href="/add-tutor.html" class="nav-link nav-link--active">Tutor Sign Up</a></li>
					<li><a href="/add-tutee.html" class="nav-link">Tutee Sign Up</a></li>
					<li><a href="/admin.html" class="nav-link">Admin Tools</a></li>
				</ul>
			</nav>
		</div>
	</header>

	<main class="page">
		<section class="card">
			<h2>Add Tutor</h2>
			<form id="tutorForm" class="form">
				<div class="form-grid">
					<label class="form-field">
						<span>First Name</span>
						<input name="firstname" />
					</label>
					<label class="form-field">
						<span>Last Name</span>
						<input name="lastname" />
					</label>
					<label class="form-field">
						<span>Email</span>
						<input name="email" type="email" />
					</label>
					<label class="form-field">
						<span>Phone</span>
						<input name="phone" />
					</label>
					<label class="form-field">
						<span>Grade</span>
						<select name="grade">
							<option value="">Select Grade</option>
							<option value="11">11</option>
							<option value="12">12</option>
						</select>
					</label>
					<label class="form-field">
						<span>Homeroom (Last Name, Room #)</span>
						<input name="homeroom" />
					</label>
					<label class="form-field form-field--full">
						<span>Current Math Class</span>
						<input name="current_class" />
					</label>
				</div>

				<fieldset class="form-fieldset">
					<legend>Courses you can tutor</legend>
					<div class="chip-list">
						<label class="chip"><input type="checkbox" name="courses" value="Algebra"> <span>Algebra</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="Geometry"> <span>Geometry</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="Advanced Algebra"> <span>Advanced Algebra</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="Precalculus"> <span>Precalculus</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="AP Precalculus AB"> <span>AP Precalculus AB</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="AP Precalculus BC"> <span>AP Precalculus BC</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="AP Calculus AB"> <span>AP Calculus AB</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="AP Calculus BC"> <span>AP Calculus BC</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="AP Statistics"> <span>AP Statistics</span></label>
						<label class="chip"><input type="checkbox" name="courses" value="Adv Math Decision Making"> <span>Adv Math Decision Making</span></label>
					</div>
				</fieldset>

				<fieldset class="form-fieldset">
					<legend>Availability</legend>
					<div class="chip-list">
						<label class="chip"><input type="checkbox" name="availability" value="Before School"> <span>Before School</span></label>
						<label class="chip"><input type="checkbox" name="availability" value="After School"> <span>After School</span></label>
						<label class="chip"><input type="checkbox" name="availability" value="WEB"> <span>WEB</span></label>
						<label class="chip"><input type="checkbox" name="availability" value="3rd Period"> <span>3rd Period</span></label>
						<label class="chip"><input type="checkbox" name="availability" value="4th Period"> <span>4th Period</span></label>
						<label class="chip"><input type="checkbox" name="availability" value="5th Period"> <span>5th Period</span></label>
						<label class="chip"><input type="checkbox" name="availability" value="6th Period"> <span>6th Period</span></label>
					</div>
				</fieldset>

				<div class="form-actions">
					<button type="submit" class="button button--primary">Submit</button>
				</div>
			</form>
			<script src="app.js"></script>
		</section>
	</main>
</body>
