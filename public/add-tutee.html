<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
	<title>Tutee Sign Up - Walton MAT</title>
</head>
<body>
	<div>
		<h2>Add Tutee</h2>
		<form id="tuteeForm">
			First Name: <input name="firstname"><br>
			Last Name: <input name="lastname"><br>
			Email: <input name="email"><br>
			Phone: <input name="phone"><br>
			Grade: <select name="grade">
				<option value="">Select Grade</option>
				<option value="9">9</option>
				<option value="10">10</option>
				<option value="11">11</option>
				<option value="12">12</option>
			</select><br>
			Homeroom (Last Name, Room #): <input name="homeroom"><br>
			Math Class Level: <select name="level">
				<option value="">Select On Level/Honors/AP</option>
				<option value="On Level">On Level</option>
				<option value="Honors">Honors</option>
				<option value="AP">AP</option>
			</select><br>
			Math Class Name: <select name="courses">
				<option value="">Select Class Name</option>
				<option value="Algebra">Algebra</option><br>
				<option value="Accel Geo/Adv Alg">Accel Geo/Adv Alg</option><br>
				<option value="Geometry">Geometry</option><br>
				<option value="Advanced Algebra">Advanced Algebra</option><br>
				<option value="Precalculus">Precalculus</option><br>
				<option value="AP Precalculus AB">AP Precalculus AB</option><br>
				<option value="AP Precalculus BC">AP Precalculus BC</option><br>
				<option value="AP Calculus AB">AP Calculus AB</option><br>
				<option value="AP Calculus BC">AP Calculus BC</option><br>
				<option value="AP Statistics">AP Statistics</option><br>
				<option value="Adv Math Decision Making">Adv Math Decision Making</option><br>
			</select><br>
			Math Class Teacher: <input name="teacher"><br>
			Availability:<br>
			<label><input type="checkbox" name="availability" value="Before School"> Before School</label><br>
			<label><input type="checkbox" name="availability" value="After School"> After School</label><br>
			<label><input type="checkbox" name="availability" value="WEB"> WEB</label><br>
			<label><input type="checkbox" name="availability" value="3rd Period"> 3rd Period</label><br>
			<label><input type="checkbox" name="availability" value="4th Period"> 4th Period</label><br>
			<label><input type="checkbox" name="availability" value="5th Period"> 5th Period</label><br>
			<label><input type="checkbox" name="availability" value="6th Period"> 6th Period</label><br>
			<button type="submit">Submit</button>
		</form>
		<script src="app.js"></script>
	</div>
</body>
